- year: "1971-1988"
  title: "Pretoria: curiosity before applause"
  stage: "Early life"
  image: "https://upload.wikimedia.org/wikipedia/commons/thumb/1/1f/Pretoria_Skyline.jpg/1280px-Pretoria_Skyline.jpg"
  setback: "Public biographies often describe a bookish, solitary childhood and periods of bullying."
  encouragement: "Turn isolation into learning density. When people do not understand yet, let physics, code, and books become the first audience."
  note: "This phase is about learning habits: reading deeply, decomposing problems, and turning ideas into working programs."
- year: "1989-1994"
  title: "Canada and Penn: physics plus economics"
  stage: "Education"
  image: "https://upload.wikimedia.org/wikipedia/commons/d/dd/University_of_Pennsylvania_College_Hall.jpg"
  setback: "Moving across countries meant rebuilding identity, networks, and resources from scratch."
  encouragement: "If the world feels too large, reduce the goal to first principles: cost, energy, speed, and probability."
  note: "Public biographies record Queen's University and later the University of Pennsylvania."
- year: "1995"
  title: "Zip2: the first office became a bedroom"
  stage: "Startup"
  image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Silicon_Valley.jpg/1280px-Silicon_Valley.jpg"
  setback: "Early constraints meant product, sales, servers, and demos all had to be handled directly."
  encouragement: "When there is no office culture, build a delivery culture first. Shipping code is the earliest credibility."
  note: "Zip2 helped bring newspaper directories, maps, and local business information online."
- year: "1999-2002"
  title: "X.com / PayPal: conflict inside a financial network"
  stage: "Platform"
  image: "https://upload.wikimedia.org/wikipedia/commons/3/31/PayPal_Logo2014.svg"
  setback: "After the X.com and Confinity merger, strategy, technology choices, and leadership became contested."
  encouragement: "Being replaced once is not the end. It may simply move you from one company to a larger problem."
  note: "The PayPal exit supplied capital for later high-risk companies."
- year: "2002-2008"
  title: "SpaceX: Falcon 1 after three failures"
  stage: "Aerospace"
  image: "https://upload.wikimedia.org/wikipedia/commons/c/c8/Falcon_1_Flight_4_liftoff.jpg"
  setback: "The first three Falcon 1 launches failed, and the company came close to running out of money."
  encouragement: "If a fourth attempt is still worth doing, the first three failures are engineering data, not a verdict."
  note: "Falcon 1 reached orbit in 2008, followed by major NASA commercial contracts."
- year: "2004-2012"
  title: "Tesla: from investor to product architect"
  stage: "Electric vehicles"
  image: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fd/Charging_Tesla_Model_S_01.jpg/1280px-Charging_Tesla_Model_S_01.jpg"
  setback: "Roadster delays, supply chain pressure, the 2008 financial crisis, and funding stress nearly broke Tesla."
  encouragement: "The enemy of product is not difficulty; it is refusing to identify where difficulty comes from."
  note: "Model S helped move electric vehicles into high-performance consumer products."
- year: "2013-2018"
  title: "Reusable rockets and production hell"
  stage: "Scaling"
  image: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/b7/Falcon_9_first_stage_at_LZ-1%28three%29.jpg/1280px-Falcon_9_first_stage_at_LZ-1%28three%29.jpg"
  setback: "SpaceX had to prove reuse while Tesla endured Model 3 production hell."
  encouragement: "Leaders should be where the bottleneck is. Conference rooms do not fix production lines."
  note: "This phase tested manufacturing, supply chains, and operations, not just engineering concepts."
- year: "2019-2026"
  title: "Starship, AI, X, and parallel companies"
  stage: "Multi-company execution"
  image: "https://upload.wikimedia.org/wikipedia/commons/thumb/f/f9/Starship-IFT2-ascent_%28close_cropped%29.jpg/1280px-Starship-IFT2-ascent_%28close_cropped%29.jpg"
  setback: "Running several companies at once compounds management span, regulation, public pressure, and engineering risk."
  encouragement: "Complex systems do not become simple through slogans; they need clear interfaces, rapid tests, and continuous deletion."
  note: "The keywords are reuse, scale, AI, communications infrastructure, and cross-company engineering."
