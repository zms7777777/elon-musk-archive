- company: "Tesla"
  intro: "Public-company shareholder snapshot focused on widely disclosed beneficial owners and large institutional holders. Percentages change over time; this page uses public proxy and investor-reporting context."
  items:
    - name: "Elon Musk"
      initials: "EM"
      type: "Founder / largest individual beneficial owner"
      stake: "Tesla's 2025 proxy identifies Musk as a major beneficial owner; later public filings also show him above 20% on a beneficial-ownership basis."
      summary: "Musk's ownership links voting influence, founder identity, and long-term product direction across vehicles, energy, autonomy, robotics, and AI infrastructure."
      detail: "For customers reading this archive, he is the central individual shareholder because Tesla's governance and strategic narrative are closely tied to his founder/operator role."
      url: "https://ir.tesla.com/"
    - name: "The Vanguard Group"
      initials: "VG"
      type: "Institutional shareholder"
      stake: "Tesla proxy materials list Vanguard among beneficial owners with a reportable institutional position."
      summary: "Vanguard represents broad index-fund and asset-management ownership rather than a single founder-style strategic owner."
      detail: "Its influence comes through stewardship, proxy voting, and the scale of passive ownership across public markets."
      url: "https://corporate.vanguard.com/"
    - name: "BlackRock"
      initials: "BR"
      type: "Institutional shareholder"
      stake: "Tesla proxy materials list BlackRock among beneficial owners with a reportable institutional position."
      summary: "BlackRock is another large institutional holder whose role is primarily public-market ownership and stewardship."
      detail: "The firm is relevant to Tesla governance because institutional voting can matter during compensation, board, and shareholder proposal votes."
      url: "https://www.blackrock.com/"
    - name: "Retail and index investors"
      initials: "RI"
      type: "Distributed shareholder base"
      stake: "Tesla also has a large public float held through brokerages, index funds, retirement accounts, and individual investors."
      summary: "This distributed base is important because Tesla votes often become public referenda on leadership, compensation, governance, and strategy."
      detail: "Unlike private-company investors, these holders can enter or exit through public markets and vote through broker or fund proxy systems."
      url: "https://ir.tesla.com/"
- company: "SpaceX"
  intro: "SpaceX is private, so it does not publish a public shareholder table like Tesla. The entries below are public founder/investor-side names frequently reported in funding and ownership coverage."
  items:
    - name: "Elon Musk"
      initials: "EM"
      type: "Founder / controlling private-company shareholder"
      stake: "SpaceX ownership details are private, but Musk is widely described as the founder and controlling figure."
      summary: "His role combines founder equity, CEO leadership, vehicle strategy, launch architecture, and long-term Mars-focused mission framing."
      detail: "On this page, Musk is treated as the anchor shareholder/operator rather than as a passive investor."
      url: "https://www.spacex.com/"
    - name: "Founders Fund"
      initials: "FF"
      type: "Early institutional investor"
      stake: "Founders Fund is publicly associated with early institutional backing of SpaceX."
      summary: "The firm is relevant because early private capital helped support SpaceX before reusable launch had become a proven commercial category."
      detail: "Its profile fits the venture-style investor role: high-risk backing of a technically ambitious company before market validation."
      url: "https://foundersfund.com/"
    - name: "Fidelity"
      initials: "FI"
      type: "Growth investor"
      stake: "Fidelity has been publicly reported as an investor in SpaceX private-market rounds."
      summary: "Fidelity represents later-stage private-company capital, where investors participate after operational traction and valuation growth."
      detail: "For customers, this is useful context because private SpaceX ownership includes both founder control and large institutional capital."
      url: "https://www.fidelity.com/"
    - name: "Alphabet / Google"
      initials: "GO"
      type: "Strategic investor"
      stake: "Google/Alphabet has been publicly associated with SpaceX investment coverage around satellite and connectivity ambitions."
      summary: "Strategic backing matters because SpaceX's business spans launch, satellites, communications, and data infrastructure."
      detail: "This is listed as public investor-side context rather than as a current complete shareholder disclosure."
      url: "https://abc.xyz/"
- company: "X.com"
  intro: "X is private and was later combined with xAI in an all-stock transaction announced in March 2025. Public ownership data is therefore reported, partial, and event-based rather than a live official cap table."
  items:
    - name: "xAI / Elon Musk"
      initials: "XA"
      type: "Parent-company context"
      stake: "In March 2025, Musk said xAI acquired X in an all-stock transaction valuing X equity at about $33 billion."
      summary: "X.com is now best understood in this archive as part of Musk's AI-and-distribution ecosystem rather than as a standalone public company."
      detail: "The shareholder story changed after the xAI transaction because X's platform, users, data, and distribution became tied to xAI's model and product roadmap."
      url: "https://x.ai/"
    - name: "Prince Alwaleed / Kingdom Holding"
      initials: "KA"
      type: "Reported X investor"
      stake: "Public reporting and court-unsealed lists identified Saudi investor Prince Alwaleed bin Talal / Kingdom Holding among X backers."
      summary: "This investor profile is relevant because it represents large outside capital rolled into or supporting the private X ownership structure."
      detail: "The page treats this as public reporting about the X buyout-era shareholder base, not as a current official post-xAI cap-table statement."
      url: "https://kingdom.com.sa/"
    - name: "Larry Ellison"
      initials: "LE"
      type: "Reported X investor"
      stake: "Court-unsealed and media reports have identified Larry Ellison among investors connected to Musk's X acquisition."
      summary: "Ellison's role is useful context because X's ownership history included high-profile technology founders and strategic personal investors."
      detail: "He is included as an individually recognizable investor figure rather than as a corporate operating partner."
      url: "https://www.oracle.com/"
    - name: "Andreessen Horowitz / Sequoia"
      initials: "AS"
      type: "Venture investors"
      stake: "Public reporting has identified Andreessen Horowitz and Sequoia among X buyout-era investors, and both are also associated with xAI funding coverage."
      summary: "These venture firms connect X.com's ownership history with the broader AI, social, and private-market technology investor network."
      detail: "They are grouped here to keep the page compact while still showing the venture-capital layer behind the X/xAI story."
      url: "https://a16z.com/"
