<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    {% include header.html %}
    <div class="page-shell no-sidebar">
      <main class="content">
        {{ content }}
      </main>
    </div>
    {% include footer.html %}

    <div class="search-layer" data-search-layer hidden>
      <div class="search-backdrop" data-search-close></div>
      <section class="search-modal" role="dialog" aria-modal="true" aria-labelledby="search-layer-title">
        <button class="search-close" type="button" aria-label="Close search" data-search-close>×</button>
        <p class="overlay-kicker">Search</p>
        <h2 id="search-layer-title">Search</h2>
        <input id="site-search" type="search" placeholder="Enter your search.." autocomplete="off">
        <section id="search-results" class="search-results" aria-live="polite"></section>
      </section>
    </div>

    <script src="{{ '/assets/js/search-index.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
  </body>
</html>
